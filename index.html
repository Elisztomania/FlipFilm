<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FilmFlip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- Header -->
  <div class="hud-top">
    <span class="app-title">FilmFlip</span>
    <span class="film-badge">C41</span>
  </div>

  <!-- Panneau réglages couleurs -->
  <div class="settings-panel" id="settingsPanel">
    <div class="panel-handle"></div>

    <div class="setting-row">
      <span class="setting-label">Balance</span>
      <input type="range" id="colorShift" min="-100" max="100" value="0">
      <span class="setting-val" id="shiftValue">0</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">Rouge</span>
      <input type="range" id="red" min="-100" max="100" value="0">
    </div>
    <div class="setting-row">
      <span class="setting-label">Vert</span>
      <input type="range" id="green" min="-100" max="100" value="0">
    </div>
    <div class="setting-row">
      <span class="setting-label">Bleu</span>
      <input type="range" id="blue" min="-100" max="100" value="0">
    </div>
    <div class="divider"></div>
    <div class="setting-row">
      <span class="setting-label">Luminosité</span>
      <input type="range" id="brightness" min="-100" max="100" value="0">
    </div>
    <div class="setting-row">
      <span class="setting-label">Contraste</span>
      <input type="range" id="contrast" min="-100" max="100" value="0">
    </div>
    <div class="setting-row">
      <span class="setting-label">Saturation</span>
      <input type="range" id="saturation" min="-100" max="100" value="0">
    </div>
    <div class="divider"></div>
    <div class="setting-row toggle-row">
      <span class="setting-label">Noir &amp; Blanc</span>
      <label class="toggle">
        <input type="checkbox" id="bwMode">
        <span class="toggle-track"></span>
      </label>
    </div>
    <button class="reset-btn" id="resetBtn">Réinitialiser</button>
  </div>

  <!-- Overlay bas : réglages | capture | flip -->
  <div class="hud-bottom">
    <button class="hud-btn settings-btn" id="settingsBtn" aria-label="Réglages">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <button class="capture-btn" id="captureBtn" aria-label="Capturer">
      <span class="capture-ring"></span>
      <span class="capture-inner"></span>
    </button>

    <button class="hud-btn flip-btn" id="flipBtn" aria-label="Retourner caméra">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M1 4v6h6"/>
        <path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
